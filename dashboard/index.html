<!DOCTYPE html>
<html>

<head>

<title>Rate Limiter Dashboard</title>

<link rel="stylesheet" href="/static/style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<header>

<h1>Distributed Rate Limiter</h1>

<nav>

<a href="/">API</a>
<a href="/dashboard">Dashboard</a>
<a href="/docs">Docs</a>

</nav>

</header>

<div class="container">

<div class="metrics">

<div class="card">
<h3>Allowed</h3>
<p id="allowed">0</p>
</div>

<div class="card">
<h3>Blocked</h3>
<p id="blocked">0</p>
</div>

<div class="card">
<h3>Total</h3>
<p id="total">0</p>
</div>

<div class="card">
<h3>Requests / Min</h3>
<p id="rpm">0</p>
</div>

</div>

<div class="card">

<h2>Traffic Overview</h2>

<canvas id="chart"></canvas>

</div>

<div class="card">

<h2>Top Clients</h2>

<table>

<thead>
<tr>
<th>IP</th>
<th>Requests</th>
</tr>
</thead>

<tbody id="ipTable"></tbody>

</table>

</div>

<div class="card">

<h2>System Info</h2>

<ul id="system"></ul>

</div>

<div class="card">

<h2>Tech Stack</h2>

<ul>

<li>Python</li>
<li>FastAPI</li>
<li>Redis</li>
<li>Docker</li>
<li>Render</li>
<li>Chart.js</li>

</ul>

</div>

</div>

<footer>

<p>© Prafful Gupta</p>

</footer>

<script>

let chart

async function loadStats(){

const res = await fetch("/stats")
const data = await res.json()

document.getElementById("allowed").innerText=data.allowed
document.getElementById("blocked").innerText=data.blocked
document.getElementById("total").innerText=data.total
document.getElementById("rpm").innerText=data.requests_per_minute

if(!chart){

const ctx=document.getElementById("chart")

chart=new Chart(ctx,{
type:"bar",
data:{
labels:["Allowed","Blocked"],
datasets:[{
label:"Requests",
data:[data.allowed,data.blocked],
backgroundColor:["#22c55e","#ef4444"]
}]
}
})

}else{

chart.data.datasets[0].data=[data.allowed,data.blocked]
chart.update()

}

}

async function loadIps(){

const res = await fetch("/top_ips")
const data = await res.json()

const table = document.getElementById("ipTable")

table.innerHTML=""

data.forEach(row=>{

const tr=document.createElement("tr")

tr.innerHTML="<td>"+row.ip+"</td><td>"+row.requests+"</td>"

table.appendChild(tr)

})

}

async function loadSystem(){

const res=await fetch("/system")
const data=await res.json()

const list=document.getElementById("system")

list.innerHTML=""

Object.entries(data).forEach(([k,v])=>{

const li=document.createElement("li")

li.innerText=k+" : "+v

list.appendChild(li)

})

}

setInterval(()=>{
loadStats()
loadIps()
loadSystem()
},2000)

</script>

</body>
</html>
