<!DOCTYPE html>
<html>

<head>

<title>Rate Limiter Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body {
    font-family: Arial;
    background: #0f172a;
    color: white;
    text-align: center;
}

h1 {
    margin-top: 40px;
}

.container {
    width: 600px;
    margin: auto;
    background: #1e293b;
    padding: 30px;
    border-radius: 10px;
}

canvas {
    margin-top: 20px;
}

</style>

</head>

<body>

<h1>Distributed Rate Limiter</h1>

<div class="container">

<h3>Traffic Metrics</h3>

<canvas id="chart"></canvas>

</div>

<script>

async function loadStats(){

    const response = await fetch("/stats")

    const data = await response.json()

    const ctx = document.getElementById("chart")

    new Chart(ctx, {

        type: "bar",

        data: {

            labels: ["Allowed Requests","Blocked Requests"],

            datasets: [{
                label: "Requests",
                data: [data.allowed_requests, data.blocked_requests],
                backgroundColor: ["#22c55e","#ef4444"]
            }]

        }

    })

}

loadStats()

</script>

</body>

</html>
