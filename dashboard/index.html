<!DOCTYPE html>
<html>

<head>

<title>Distributed Rate Limiter Dashboard</title>

<link rel="stylesheet" href="/dashboard/style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<header>

<h1>Distributed Rate Limiter</h1>

<nav>

<a href="/">API</a>
<a href="/dashboard">Dashboard</a>

</nav>

</header>

<div class="container">

<div class="metrics">

<div class="card">
<h3>Allowed</h3>
<p id="allowed">0</p>
</div>

<div class="card">
<h3>Blocked</h3>
<p id="blocked">0</p>
</div>

<div class="card">
<h3>Total</h3>
<p id="total">0</p>
</div>

<div class="card">
<h3>Requests / Min</h3>
<p id="rpm">0</p>
</div>

</div>

<div class="card">

<h2>Traffic</h2>

<canvas id="chart"></canvas>

</div>

<div class="card">

<h2>Top Clients</h2>

<ul id="ips"></ul>

</div>

</div>

<footer>

© Prafful Gupta

</footer>

<script>

let chart

async function loadStats(){

const res = await fetch("/stats")
const data = await res.json()

document.getElementById("allowed").innerText=data.allowed
document.getElementById("blocked").innerText=data.blocked
document.getElementById("total").innerText=data.total
document.getElementById("rpm").innerText=data.requests_per_minute

if(!chart){

const ctx=document.getElementById("chart")

chart=new Chart(ctx,{
type:"bar",
data:{
labels:["Allowed","Blocked"],
datasets:[{
label:"Requests",
data:[data.allowed,data.blocked],
backgroundColor:["green","red"]
}]
}
})

}else{

chart.data.datasets[0].data=[data.allowed,data.blocked]
chart.update()

}

}

async function loadIps(){

const res=await fetch("/top_ips")
const data=await res.json()

const list=document.getElementById("ips")

list.innerHTML=""

data.forEach(item=>{

const li=document.createElement("li")

li.innerText=item.ip+" : "+item.requests

list.appendChild(li)

})

}

setInterval(()=>{
loadStats()
loadIps()
},2000)

</script>

</body>
</html>
