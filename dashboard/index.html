<!DOCTYPE html>
<html>

<head>

<title>Distributed Rate Limiter</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
margin:0;
}

.nav{
background:#020617;
padding:15px;
display:flex;
justify-content:space-between;
}

.container{
width:1000px;
margin:auto;
margin-top:30px;
}

.card{
background:#1e293b;
padding:25px;
margin-bottom:20px;
border-radius:8px;
}

.metrics{
display:flex;
justify-content:space-between;
}

.metric{
background:#020617;
padding:15px;
border-radius:6px;
width:30%;
text-align:center;
}

</style>

</head>

<body>

<div class="nav">
<h2>Distributed Rate Limiter</h2>
<a href="/" style="color:white">API</a>
</div>

<div class="container">

<div class="card">

<h3>Traffic Metrics</h3>

<div class="metrics">

<div class="metric">
<h4>Allowed</h4>
<p id="allowed">0</p>
</div>

<div class="metric">
<h4>Blocked</h4>
<p id="blocked">0</p>
</div>

<div class="metric">
<h4>Total</h4>
<p id="total">0</p>
</div>

</div>

</div>

<div class="card">
<h3>Requests per Minute</h3>
<p id="rpm">0</p>
</div>

<div class="card">
<h3>Top IPs</h3>
<ul id="topIps"></ul>
</div>

<div class="card">
<h3>Traffic Graph</h3>
<canvas id="chart"></canvas>
</div>

</div>

<script>

let chart

async function loadStats(){

const res=await fetch("/stats")
const data=await res.json()

document.getElementById("allowed").innerText=data.allowed
document.getElementById("blocked").innerText=data.blocked
document.getElementById("total").innerText=data.total
document.getElementById("rpm").innerText=data.requests_per_minute

if(!chart){

const ctx=document.getElementById("chart")

chart=new Chart(ctx,{
type:"bar",
data:{
labels:["Allowed","Blocked"],
datasets:[{
label:"Requests",
data:[data.allowed,data.blocked],
backgroundColor:["#22c55e","#ef4444"]
}]
}
})

}else{

chart.data.datasets[0].data=[data.allowed,data.blocked]
chart.update()

}

}

async function loadTopIps(){

const res=await fetch("/top_ips")
const data=await res.json()

const list=document.getElementById("topIps")

list.innerHTML=""

data.forEach(item=>{
const li=document.createElement("li")
li.innerText=item.ip+" : "+item.requests
list.appendChild(li)
})

}

setInterval(()=>{
loadStats()
loadTopIps()
},2000)

</script>

</body>
</html>
